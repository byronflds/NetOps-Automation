version: "3.9"

services:

  web:
    build: .
    container_name: netops_web
    ports:
      - "5000:5000"
    depends_on:
      - redis
    environment:
      - FLASK_ENV=development

  worker:
    build: .
    container_name: netops_worker
    command: python worker.py
    depends_on:
      - redis

  redis:
    image: redis:7
    container_name: netops_redis
    ports:
      - "6379:6379"